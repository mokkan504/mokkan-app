<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <title>My page | MOKKAN 목간</title>
    <meta name="description" content="목간 회원이 자신의 정보와 문의 이력을 확인하고 수정하는 페이지입니다.">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="signup-body">
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="MOKKAN home">
        <img src="./assets/mokkan-logo.png" alt="MOKKAN 목간 로고">
        <span class="brand-word">MOKKAN <span class="brand-hanja">木間</span></span>
      </a>
      <nav class="nav" aria-label="주요 메뉴">
        <a href="./products.html">제품</a>
        <a href="./furniture-finder.html">맞춤 가이드</a>
        <a href="./portfolio.html">작업 사례</a>
        <a class="nav-cta" href="./contact.html">제작 문의</a>
        <a href="./journal.html">가구 이야기</a>
        <a href="./about.html">소개</a>
        <a href="./cart.html">장바구니 <span id="cartCount" class="cart-count">0</span></a>
        <a href="./mypage.html">마이페이지</a>
        <a href="./signup.html">회원가입</a>
        <a href="./login.html">로그인</a>
      </nav>
    </header>

    <main class="signup-shell">
      <section class="signup-intro">
        <p class="eyebrow">My page</p>
        <h1>나의 목간</h1>
        <p>회원 정보, 문의 이력, 관심 제품과 장바구니를 한곳에서 확인합니다.</p>
      </section>

      <section id="mypageGate" class="signup-layout" hidden>
        <div class="signup-aside">
          <h2>로그인이 필요합니다</h2>
          <p>회원가입 또는 로그인 후 My page를 이용할 수 있습니다.</p>
          <a class="button primary aside-link" href="./login.html">로그인</a>
          <a class="button ghost dark aside-link" href="./signup.html">회원가입</a>
        </div>
      </section>

      <section id="mypageContent" class="mypage-layout" hidden>
        <form class="signup-form" id="mypageForm">
          <h2>회원 정보</h2>
          <div class="form-grid-two">
            <label>
              이름
              <input type="text" name="name" required>
            </label>
            <label data-birthdate>
              생년월일
              <input type="hidden" name="birthDate">
              <span class="birthdate-selects">
                <select data-birth-year aria-label="출생 연도" required></select>
                <select data-birth-month aria-label="출생 월" required></select>
                <select data-birth-day aria-label="출생 일" required></select>
              </span>
            </label>
          </div>
          <div class="form-grid-two">
            <label>
              이메일
              <input type="email" name="email" readonly>
            </label>
            <label>
              연락처
              <input type="tel" name="phone" required>
            </label>
          </div>
          <label>
            주소
            <input type="text" name="address" required>
          </label>
          <div class="form-grid-two">
            <label>
              관심 분야
              <select name="interest">
                <option>가구 제작 문의</option>
                <option>식탁</option>
                <option>책상</option>
                <option>사이드 테이블</option>
                <option>주문제작 상담</option>
                <option>블로그/정보 콘텐츠</option>
              </select>
            </label>
            <label>
              선호 연락 방식
              <select name="contactMethod">
                <option>이메일</option>
                <option>문자</option>
                <option>전화</option>
              </select>
            </label>
          </div>
          <label class="check-label">
            <input type="checkbox" name="marketingConsent">
            제품 및 나무 이야기 소식을 받겠습니다.
          </label>
          <div class="admin-actions">
            <button type="submit">정보 수정</button>
            <button type="button" class="secondary-button" id="memberLogout">로그아웃</button>
          </div>
          <p class="form-note" id="mypageResult" role="status"></p>
        </form>

        <aside class="mypage-side">
          <article class="signup-aside">
            <h2>회원 요약</h2>
            <div class="mypage-summary" id="memberSummary"></div>
          </article>
          <article class="signup-aside">
            <h2>장바구니</h2>
            <div id="mypageCart"></div>
            <a class="button ghost dark aside-link" href="./cart.html">장바구니 보기</a>
          </article>
        </aside>
      </section>

      <section id="mypageHistory" class="section mypage-history" hidden>
        <div class="section-head">
          <p class="eyebrow">History</p>
          <h2>문의 이력</h2>
          <p>로그인한 이메일로 접수한 제작 문의 내역입니다.</p>
        </div>
        <div class="table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>접수일</th>
                <th>제품군</th>
                <th>요청 내용</th>
                <th>예산</th>
                <th>상태</th>
              </tr>
            </thead>
            <tbody id="mypageInquiryRows"></tbody>
          </table>
        </div>
        <p class="empty-state" id="emptyMypageInquiries" hidden>아직 문의 이력이 없습니다.</p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.102.0/dist/umd/supabase.min.js"></script>
    <script src="./supabase-config.js"></script><script src="./backend.js"></script>
    <script src="./birthdate.js"></script>
    <script src="./mypage.js"></script>
    <script src="./cart.js"></script>
    <script src="./auth.js"></script>
      <script src="./analytics.js"></script>
</body>
</html>
