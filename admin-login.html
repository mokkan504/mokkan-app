<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MOKKAN 목간 | 관리자 로그인</title>
    <meta name="description" content="목간 관리자 로그인 페이지입니다.">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="signup-body">
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="MOKKAN home">
        <img src="./assets/mokkan-logo.png" alt="MOKKAN 목간 로고">
        <span>MOKKAN Admin</span>
      </a>
      <nav class="nav" aria-label="관리자 로그인 메뉴">
        <a href="./index.html">홈페이지</a>
        <a href="./login.html">회원 로그인</a>
      </nav>
    </header>

    <main class="signup-shell">
      <section class="signup-intro">
        <p class="eyebrow">Admin Only</p>
        <h1>관리자 로그인</h1>
        <p>고객 정보를 안전하게 보호하기 위해 서버 기반 인증으로 전환하고 있습니다.</p>
      </section>

      <section class="signup-layout">
        <section class="signup-form" aria-labelledby="adminMaintenanceTitle">
          <h2 id="adminMaintenanceTitle">보안 업그레이드 중</h2>
          <p>관리자 로그인은 새 인증 시스템이 연결될 때까지 잠시 사용할 수 없습니다.</p>
          <a class="button primary" href="./index.html">홈페이지로 돌아가기</a>
        </section>

        <aside class="signup-aside">
          <h2>개인정보 보호</h2>
          <p>공개된 고정 비밀번호 방식은 제거되었습니다.</p>
          <p>새 시스템에는 이메일 인증, 역할 기반 접근 제어와 데이터베이스 행 단위 보안 정책이 적용됩니다.</p>
        </aside>
      </section>
    </main>
  </body>
</html>
