<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <title>MOKKAN 목간 | 관리자 로그인</title>
    <meta name="description" content="목간 관리자 로그인 페이지입니다.">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="signup-body">
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="MOKKAN home">
        <img src="./assets/mokkan-logo.png" alt="MOKKAN 목간 로고">
        <span>MOKKAN Admin</span>
      </a>
      <nav class="nav" aria-label="관리자 로그인 메뉴">
        <a href="./index.html">홈페이지</a>
        <a href="./login.html">회원 로그인</a>
      </nav>
    </header>

    <main class="signup-shell">
      <section class="signup-intro">
        <p class="eyebrow">Admin Only</p>
        <h1>관리자 로그인</h1>
        <p>승인된 관리자 계정으로 로그인하세요.</p>
      </section>

      <section class="signup-layout">
        <form class="signup-form" id="adminLoginForm">
          <label>관리자 이메일<input type="email" name="email" autocomplete="username" required></label>
          <label>비밀번호<input type="password" name="password" autocomplete="current-password" required></label>
          <button type="submit">관리자 로그인</button><p class="form-note" id="adminLoginResult" role="status"></p>
        </form>

        <aside class="signup-aside">
          <h2>개인정보 보호</h2>
          <p>이메일 인증과 데이터베이스 역할 권한을 모두 통과해야 접근할 수 있습니다.</p>
        </aside>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.102.0/dist/umd/supabase.min.js"></script>
    <script src="./supabase-config.js"></script><script src="./backend.js"></script><script src="./admin-login.js"></script>
  </body>
</html>
