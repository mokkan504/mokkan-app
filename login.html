<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <title>MOKKAN 목간 | 로그인</title>
    <meta name="description" content="목간 회원 로그인 페이지입니다.">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="signup-body">
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="MOKKAN home">
        <img src="./assets/mokkan-logo.png" alt="MOKKAN 목간 로고">
        <span class="brand-word">MOKKAN <span class="brand-hanja">木間</span></span>
      </a>
      <nav class="nav" aria-label="로그인 메뉴">
        <a href="./products.html">제품</a>
        <a href="./signup.html">회원가입</a>
        <a href="./mypage.html">마이페이지</a>
        <a href="./cart.html">장바구니 <span id="cartCount" class="cart-count">0</span></a>
      </nav>
    </header>

    <main class="signup-shell">
      <section class="signup-intro">
        <p class="eyebrow">Login</p>
        <h1>회원 로그인</h1>
        <p>회원가입한 이메일과 비밀번호로 로그인합니다. 이메일 인증을 완료한 계정만 이용할 수 있습니다.</p>
      </section>

      <section class="signup-layout">
        <form class="signup-form" id="loginForm">
          <label>
            이메일
            <input type="email" name="email" placeholder="mokkan@example.com" required>
          </label>
          <label>
            비밀번호
            <input type="password" name="password" required>
          </label>
          <button type="submit">로그인</button>
          <p class="form-note" id="loginResult" role="status"></p>
        </form>

        <aside class="signup-aside">
          <h2>회원 로그인 안내</h2>
          <p>로그인하면 회원 정보와 상담 이력을 기반으로 주문제작 문의를 더 편하게 이어갈 수 있습니다.</p>
          <p>아직 회원이 아니라면 회원가입 후 이용해 주세요.</p>
          <a class="button primary aside-link" href="./signup.html">회원가입</a>
        </aside>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.102.0/dist/umd/supabase.min.js"></script>
    <script src="./supabase-config.js"></script><script src="./backend.js"></script>
    <script src="./login.js"></script>
    <script src="./cart.js"></script>
    <script src="./auth.js"></script>
  </body>
</html>
