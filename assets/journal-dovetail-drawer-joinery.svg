<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">도브테일 결구가 보이는 원목 서랍 모서리</title>
  <desc id="desc">작업대 위에서 서랍 앞판과 옆판이 사다리꼴 도브테일 결구로 맞물리는 모습을 설명하는 목재 질감 일러스트</desc>
